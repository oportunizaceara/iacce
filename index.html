<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil de Lote - Relatórios de Turmas</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: "Inter", system-ui, -apple-system, sans-serif;
      --bg: #f4f3ef;
      --bg-subtle: #eceae4;
      --fg: #1c1917;
      --fg-muted: #78716c;
      --card: #ffffff;
      --card-hover: #fafaf9;
      --border: rgba(28, 25, 23, 0.08);
      --border-strong: rgba(28, 25, 23, 0.14);
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: rgba(79, 70, 229, 0.1);
      --primary-fg: #ffffff;
      --destructive: #dc2626;
      --destructive-soft: rgba(220, 38, 38, 0.1);
      --warning: #d97706;
      --warning-soft: rgba(217, 119, 6, 0.12);
      --sidebar: rgba(255, 255, 255, 0.72);
      --sidebar-accent: rgba(28, 25, 23, 0.05);
      --sidebar-active: rgba(79, 70, 229, 0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
      --shadow: 0 8px 32px rgba(28, 25, 23, 0.08);
      --shadow-lg: 0 24px 48px rgba(28, 25, 23, 0.12);
      --header-h: 3.5rem;
      --rail-w: 15.5rem;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="dark"] {
      --bg: #0c0c0c;
      --bg-subtle: #141414;
      --fg: #f5f5f4;
      --fg-muted: #a8a29e;
      --card: #161616;
      --card-hover: #1c1c1c;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --primary: #818cf8;
      --primary-hover: #a5b4fc;
      --primary-soft: rgba(129, 140, 248, 0.15);
      --destructive-soft: rgba(248, 113, 113, 0.12);
      --warning-soft: rgba(251, 191, 36, 0.12);
      --sidebar: rgba(22, 22, 22, 0.88);
      --sidebar-accent: rgba(255, 255, 255, 0.05);
      --sidebar-active: rgba(129, 140, 248, 0.15);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 24px 48px rgba(0, 0, 0, 0.5);
    }

    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg: #0c0c0c;
        --bg-subtle: #141414;
        --fg: #f5f5f4;
        --fg-muted: #a8a29e;
        --card: #161616;
        --card-hover: #1c1c1c;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.14);
        --primary: #818cf8;
        --primary-hover: #a5b4fc;
        --primary-soft: rgba(129, 140, 248, 0.15);
        --destructive-soft: rgba(248, 113, 113, 0.12);
        --warning-soft: rgba(251, 191, 36, 0.12);
        --sidebar: rgba(22, 22, 22, 0.88);
        --sidebar-accent: rgba(255, 255, 255, 0.05);
        --sidebar-active: rgba(129, 140, 248, 0.15);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 24px 48px rgba(0, 0, 0, 0.5);
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select { font: inherit; color: inherit; }

    .icon {
      width: 1.125rem;
      height: 1.125rem;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .icon-sm { width: 1rem; height: 1rem; }
    .icon-lg { width: 1.25rem; height: 1.25rem; }

    /* ── Shell ── */
    .layout {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: .75rem;
      height: var(--header-h);
      padding: 0 1rem;
      background: var(--sidebar);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }
    @media (min-width: 768px) { .topbar { padding: 0 1.25rem; } }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: .625rem;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--fg);
      padding: .375rem .5rem;
      border-radius: var(--radius-sm);
      transition: background .15s var(--ease);
      flex-shrink: 0;
    }
    .topbar-brand:hover { background: var(--sidebar-accent); }

    .logo {
      width: 2rem;
      height: 2rem;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.35);
    }
    .logo .icon { stroke: #fff; width: 1.125rem; height: 1.125rem; }

    .topbar-title {
      font-size: .9375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: none;
    }
    @media (min-width: 640px) { .topbar-title { display: block; } }

    .topbar-search {
      flex: 1;
      max-width: 26rem;
      position: relative;
    }
    .topbar-search input {
      width: 100%;
      height: 2.25rem;
      padding: 0 .875rem 0 2.375rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg-subtle);
      font-size: .8125rem;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .topbar-search input::placeholder { color: var(--fg-muted); }
    .topbar-search input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .topbar-search-icon {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg-muted);
      pointer-events: none;
      display: flex;
    }
    .search-kbd {
      position: absolute;
      right: .625rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: .625rem;
      font-weight: 500;
      color: var(--fg-muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .125rem .375rem;
      pointer-events: none;
      display: none;
    }
    @media (min-width: 768px) { .search-kbd { display: block; } }

    .search-results {
      position: absolute;
      top: calc(100% + .5rem);
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-height: 18rem;
      overflow-y: auto;
      z-index: 60;
      padding: .375rem;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: .625rem;
      width: 100%;
      padding: .625rem .75rem;
      border: none;
      border-radius: var(--radius-sm);
      background: none;
      font-size: .8125rem;
      text-align: left;
      cursor: pointer;
      transition: background .12s;
    }
    .search-result-item:hover { background: var(--sidebar-accent); }
    .search-result-icon {
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 6px;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .search-result-sub { font-size: .6875rem; color: var(--fg-muted); margin-top: .125rem; }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: .25rem;
      margin-left: auto;
      flex-shrink: 0;
    }
    .topbar-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: pointer;
      position: relative;
      color: var(--fg-muted);
      transition: background .15s, color .15s;
    }
    .topbar-btn:hover { background: var(--sidebar-accent); color: var(--fg); }

    .notif-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 1rem;
      height: 1rem;
      padding: 0 .25rem;
      border-radius: 999px;
      background: var(--destructive);
      color: #fff;
      font-size: .5625rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--card);
    }

    .dropdown { position: relative; }
    .dropdown-menu {
      position: absolute;
      top: calc(100% + .5rem);
      right: 0;
      min-width: 15rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: .375rem;
      z-index: 60;
      animation: dropIn .15s var(--ease);
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-4px) scale(.98); }
      to { opacity: 1; transform: none; }
    }
    .dropdown-menu.wide { min-width: 20rem; max-width: 22rem; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: .625rem;
      width: 100%;
      padding: .5625rem .75rem;
      border: none;
      border-radius: var(--radius-sm);
      background: none;
      font-size: .8125rem;
      text-align: left;
      cursor: pointer;
      transition: background .12s;
    }
    .dropdown-item:hover { background: var(--sidebar-accent); }
    .dropdown-item.danger { color: var(--destructive); }
    .dropdown-divider { height: 1px; background: var(--border); margin: .375rem 0; }
    .dropdown-label {
      font-size: .6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--fg-muted);
      padding: .5rem .75rem .25rem;
    }
    .notif-item {
      padding: .75rem;
      border-radius: var(--radius-sm);
      font-size: .8125rem;
      line-height: 1.45;
    }
    .notif-item + .notif-item { margin-top: .25rem; }
    .notif-item.warn { background: var(--warning-soft); border: 1px solid rgba(217, 119, 6, 0.2); }
    .notif-item.info { background: var(--sidebar-accent); }
    .notif-empty { padding: 1.25rem; text-align: center; font-size: .8125rem; color: var(--fg-muted); }

    .avatar {
      width: 1.875rem;
      height: 1.875rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .625rem;
      font-weight: 700;
      letter-spacing: .02em;
    }

    /* ── Frame ── */
    .app-body { display: flex; flex: 1; min-height: 0; }

    .sidebar {
      width: var(--rail-w);
      flex-shrink: 0;
      display: none;
      flex-direction: column;
      background: var(--sidebar);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
    }
    .topbar-menu-btn { display: inline-flex; }
    @media (min-width: 768px) {
      .sidebar { display: flex; }
      .topbar-menu-btn { display: none !important; }
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      z-index: 45;
    }
    .sidebar-overlay.open { display: block; }

    @media (max-width: 767px) {
      .sidebar {
        display: flex;
        position: fixed;
        top: var(--header-h);
        left: 0;
        bottom: 0;
        z-index: 46;
        transform: translateX(-100%);
        transition: transform .25s var(--ease);
        box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform: translateX(0); }
    }

    .sidebar-section {
      padding: 1rem 1rem .5rem;
      font-size: .6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--fg-muted);
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: .375rem;
      padding: 0 .75rem .75rem;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .breadcrumb-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: .25rem;
      padding: .75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      font-size: .8125rem;
    }
    @media (min-width: 768px) { .breadcrumb-bar { padding: .75rem 2rem; } }

    .breadcrumb-item {
      display: inline-flex;
      align-items: center;
      gap: .375rem;
      color: var(--fg-muted);
      border: none;
      background: none;
      cursor: pointer;
      padding: .25rem .5rem;
      border-radius: 6px;
      font-size: inherit;
      transition: background .12s, color .12s;
    }
    .breadcrumb-item:hover { color: var(--fg); background: var(--sidebar-accent); }
    .breadcrumb-item.current { color: var(--fg); font-weight: 500; cursor: default; }
    .breadcrumb-item.current:hover { background: none; }
    .breadcrumb-sep { color: var(--fg-muted); opacity: .5; user-select: none; font-size: .75rem; }

    .main {
      flex: 1;
      padding: 1.25rem;
      overflow-x: hidden;
    }
    @media (min-width: 768px) { .main { padding: 1.75rem 2rem 2.5rem; } }

    .content { max-width: 58rem; margin: 0 auto; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .5625rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: var(--primary);
      color: var(--primary-fg);
      font-size: .8125rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 1px 2px rgba(79, 70, 229, 0.2);
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: var(--card);
      color: var(--fg);
      border-color: var(--border-strong);
      box-shadow: var(--shadow-sm);
    }
    .btn-outline:hover { background: var(--card-hover); }
    .btn-sm { padding: .4375rem .875rem; font-size: .8125rem; width: auto; }
    .btn-ghost {
      background: transparent;
      border: none;
      box-shadow: none;
      width: auto;
      padding: .4375rem;
      color: var(--fg-muted);
    }
    .btn-ghost:hover { background: var(--sidebar-accent); color: var(--fg); }
    .btn-destructive { color: var(--destructive); }
    .btn-destructive:hover { background: var(--destructive-soft); }

    .import-msg {
      font-size: .75rem;
      color: var(--fg-muted);
      background: var(--primary-soft);
      color: var(--primary);
      padding: .5rem .625rem;
      border-radius: var(--radius-sm);
      line-height: 1.4;
    }

    /* ── Nav ── */
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: .125rem;
      padding: 0 .625rem 1rem;
      overflow-y: auto;
      flex: 1;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: .625rem;
      padding: .5625rem .625rem;
      border-radius: var(--radius-sm);
      font-size: .8125rem;
      cursor: pointer;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
      transition: background .12s;
    }
    .nav-item:hover { background: var(--sidebar-accent); }
    .nav-item.active {
      background: var(--sidebar-active);
      color: var(--primary);
      font-weight: 500;
    }
    .nav-item-icon {
      width: 1.625rem;
      height: 1.625rem;
      border-radius: 6px;
      background: var(--sidebar-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--fg-muted);
    }
    .nav-item.active .nav-item-icon {
      background: var(--primary-soft);
      color: var(--primary);
    }
    .nav-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      font-size: .625rem;
      font-weight: 600;
      background: var(--sidebar-accent);
      color: var(--fg-muted);
      padding: .125rem .4375rem;
      border-radius: 999px;
    }
    .nav-item.active .badge { background: var(--primary-soft); color: var(--primary); }
    .nav-row { display: flex; align-items: center; }
    .nav-delete {
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: .375rem;
      color: var(--fg-muted);
      border-radius: 6px;
      transition: opacity .12s, background .12s, color .12s;
    }
    .nav-delete:hover { background: var(--destructive-soft); color: var(--destructive); }
    .nav-row:hover .nav-delete { opacity: 1; }
    .nav-empty {
      padding: .75rem 1rem;
      font-size: .75rem;
      color: var(--fg-muted);
      line-height: 1.5;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .page-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .page-header .subtitle {
      font-size: .9375rem;
      color: var(--fg-muted);
      margin-top: .375rem;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: .75rem;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: .375rem;
      font-size: .75rem;
      font-weight: 500;
      color: var(--fg-muted);
      background: var(--card);
      border: 1px solid var(--border);
      padding: .3125rem .625rem;
      border-radius: 999px;
    }

    .section-title {
      font-size: .6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--fg-muted);
      margin-bottom: .875rem;
    }
    .section-title-row {
      display: flex;
      align-items: center;
      gap: .375rem;
      margin-bottom: .875rem;
    }
    .section-title-row .section-title { margin-bottom: 0; }
    .btn-edit-meta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.625rem;
      height: 1.625rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: background .12s, color .12s;
    }
    .btn-edit-meta:hover { background: var(--sidebar-accent); color: var(--primary); }
    .btn-edit-meta .icon { width: .875rem; height: .875rem; }
    .meta-cell-value {
      display: inline-flex;
      align-items: center;
      gap: .375rem;
    }
    .section { margin-bottom: 2.5rem; }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .panel-body { padding: 1.25rem; }
    @media (min-width: 768px) { .panel-body { padding: 1.5rem; } }

    /* ── Dashboard ── */
    .dash-hero {
      margin-bottom: 2rem;
      padding: 1.75rem;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .dash-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(255,255,255,.15) 0%, transparent 50%);
      pointer-events: none;
    }
    .dash-hero h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      position: relative;
    }
    .dash-hero p {
      font-size: .875rem;
      opacity: .85;
      margin-top: .375rem;
      position: relative;
    }
    .dash-hero-stat {
      margin-top: 1.25rem;
      display: flex;
      align-items: baseline;
      gap: .5rem;
      position: relative;
    }
    .dash-hero-stat strong {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }
    .dash-hero-stat span { font-size: .8125rem; opacity: .8; }

    .dash-grid {
      display: grid;
      gap: .875rem;
      margin-bottom: 1.75rem;
    }
    @media (min-width: 640px) { .dash-grid { grid-template-columns: repeat(2, 1fr); } }

    const firebaseConfig = {

      authDomain: "perfil-de-lote.firebaseapp.com",

    }
    firebase.initializeApp(firebaseConfig)
    const fbAuth = firebase.auth()
    const fbDb = firebase.database()
    const FB_DATA_PATH = "dados/relatorios"

    /** Converte listas do Firebase ({0:…, 1:…}) em array JavaScript. */
    function toArray(raw) {
      if (raw == null) return []
      if (Array.isArray(raw)) return raw.filter(Boolean)
      if (typeof raw !== "object") return []
      const keys = Object.keys(raw).filter((k) => /^\d+$/.test(k))
      if (keys.length === 0) return []
      return keys.sort((a, b) => Number(a) - Number(b)).map((k) => raw[k]).filter(Boolean)
    }

    function normalizeAluno(a) {
      if (!a || typeof a !== "object") return null
      const sexo = ["feminino", "masculino", "outros"].includes(a.sexo) ? a.sexo : "outros"
      return {
        id: a.id || uid(),
        nome: String(a.nome ?? "").trim(),
        sexo,
        dataNascimento: a.dataNascimento || "",
        idade: Number(a.idade) >= 0 ? Number(a.idade) : 0,
        municipio: a.municipio || "",
      }
    }

    function normalizeTurma(t) {
      if (!t || typeof t !== "object") return null
      return {
        id: t.id || uid(),
        turmaId: String(t.turmaId ?? "").trim(),
        municipio: t.municipio || "",
        tipologia: t.tipologia || "",
        curso: t.curso || "",
        dataInicio: t.dataInicio || "",
        dataFim: t.dataFim || "",
        concludentes: Number(t.concludentes) >= 0 ? Number(t.concludentes) : 0,
        alunos: toArray(t.alunos).map(normalizeAluno).filter(Boolean),
      }
    }

    function normalizeRelatorio(r) {
      if (!r || typeof r !== "object") return null
      return {
        id: r.id || uid(),
        nome: String(r.nome ?? "Relatório").trim(),
        criadoEm: r.criadoEm || "",
        importadoEm: r.importadoEm || undefined,
        turmas: toArray(r.turmas).map(normalizeTurma).filter(Boolean),
      }
    }

    /** Normaliza relatórios e todos os níveis aninhados (turmas, alunos). */
    function normalizeRelatorios(raw) {
      if (raw == null) return []
      let list = []
      if (Array.isArray(raw)) {
        list = raw
      } else if (typeof raw === "object") {
        if (raw.items != null) list = toArray(raw.items)
        else if (Array.isArray(raw.relatorios)) list = raw.relatorios
        else list = toArray(raw)
      }
      return list.map(normalizeRelatorio).filter(Boolean)
    }

    function fbLogin(email, password) {
      return fbAuth.signInWithEmailAndPassword(email, password)
    }
    function fbLogout() {
      return fbAuth.signOut()
    }
    function fbOnAuthChange(callback) {
      return fbAuth.onAuthStateChanged(callback)
    }
    function fbSubscribeRelatorios(callback) {
      const r = fbDb.ref(FB_DATA_PATH)
      r.on("value", (snap) => callback(parseCloudPayload(snap.val())))
      return () => r.off("value")
    }
    async function fbSaveRelatorios(data, meta) {
      const items = normalizeRelatorios(data)
      await fbDb.ref(FB_DATA_PATH).set({
        v: 1,
        items,
        metaAtendimento: Number(meta ?? metaAtendimento) > 0 ? Number(meta ?? metaAtendimento) : DEFAULT_META,
        updatedAt: firebase.database.ServerValue.TIMESTAMP,
      })
    }
    async function fbFetchRelatoriosOnce() {
      const snap = await fbDb.ref(FB_DATA_PATH).once("value")
      return parseCloudPayload(snap.val())
    }

    function parseCloudPayload(raw) {
      const relatorios = normalizeRelatorios(raw)
      let meta = DEFAULT_META
      if (raw && typeof raw === "object") {
        const m = Number(raw.metaAtendimento)
        if (m > 0) meta = m
      }
      return { relatorios, metaAtendimento: meta }
    }

    const STORAGE_KEY = "perfil-lote:relatorios:v1"
    const THEME_KEY = "perfil-lote:theme:v1"
    const REMEMBER_EMAIL_KEY = "perfil-lote:remember-email"
    const REMEMBER_CHECK_KEY = "perfil-lote:remember-login"

    const SEXO_LABEL = { feminino: "Feminino", masculino: "Masculino", outros: "Outros" }

    const FAIXAS_ETARIAS = [
      { label: "16 a 29 anos", min: 0, max: 29 },
      { label: "30 a 45 anos", min: 30, max: 45 },
      { label: "46 a 60 anos", min: 46, max: 60 },
      { label: "Acima de 60 anos", min: 61, max: Infinity },
    ]

    function uid() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36)
    }

    function faixaDeIdade(idade) {
      return FAIXAS_ETARIAS.find((f) => idade >= f.min && idade <= f.max)
    }

    function calcularPerfil(alunos) {
      const lista = toArray(alunos)
      const linhas = FAIXAS_ETARIAS.map((f) => ({
        label: f.label, feminino: 0, masculino: 0, outros: 0, total: 0,
      }))
      for (const aluno of lista) {
        if (!aluno || aluno.idade == null) continue
        const faixa = faixaDeIdade(aluno.idade)
        if (!faixa) continue
        const linha = linhas.find((l) => l.label === faixa.label)
        if (!linha) continue
        const sexo = aluno.sexo in linha ? aluno.sexo : "outros"
        linha[sexo] += 1
        linha.total += 1
      }
      const totalGeral = {
        label: "Total",
        feminino: linhas.reduce((s, l) => s + l.feminino, 0),
        masculino: linhas.reduce((s, l) => s + l.masculino, 0),
        outros: linhas.reduce((s, l) => s + l.outros, 0),
        total: linhas.reduce((s, l) => s + l.total, 0),
      }
      return { linhas, totalGeral }
    }

    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return 0
      const nasc = new Date(dataNascimento)
      if (Number.isNaN(nasc.getTime())) return 0
      const hoje = new Date()
      let idade = hoje.getFullYear() - nasc.getFullYear()
      const m = hoje.getMonth() - nasc.getMonth()
      if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--
      return idade < 0 ? 0 : idade
    }

    function formatDate(iso) {
      if (!iso) return "—"
      const [y, m, d] = iso.split("-")
      return `${d}/${m}/${y}`
    }

    function hojeIso() {
      return new Date().toISOString().slice(0, 10)
    }

    const FAIXA_LABEL_CURTO = {
      "16 a 29 anos": "16-29",
      "30 a 45 anos": "30-45",
      "46 a 60 anos": "46-60",
      "Acima de 60 anos": "60+",
    }

    const DEFAULT_META = 2200
    let metaAtendimento = DEFAULT_META

    function formatPercentual(valor) {
      return valor.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%"
    }

    function turmaConcludentes(t) {
      return Number(t.concludentes) > 0 ? Number(t.concludentes) : 0
    }

    function calcularDashboard(rels) {
      const turmas = rels.flatMap((r) => toArray(r.turmas))
      const alunos = turmas.flatMap((t) => toArray(t.alunos))
      const inscritos = alunos.length
      const concludentes = turmas.reduce((s, t) => s + turmaConcludentes(t), 0)
      const municipios = new Set(turmas.map((t) => t.municipio?.trim()).filter(Boolean))
      const { linhas, totalGeral } = calcularPerfil(alunos)
      const perfil = linhas.map((l) => ({
        label: FAIXA_LABEL_CURTO[l.label] || l.label,
        total: l.total,
        percentual: totalGeral.total > 0 ? Math.round((l.total / totalGeral.total) * 100) : 0,
      }))
      const percentualMeta = metaAtendimento > 0 ? (inscritos / metaAtendimento) * 100 : 0
      const percentualMetaQualificados = metaAtendimento > 0 ? (concludentes / metaAtendimento) * 100 : 0
      return {
        relatorios: rels.length,
        turmas: turmas.length,
        inscritos,
        concludentes,
        municipios: municipios.size,
        meta: metaAtendimento,
        percentualMeta,
        percentualMetaQualificados,
        perfil,
      }
    }

    function normalizarTurmaId(id) {
      return String(id ?? "").trim().toLowerCase()
    }

    function idsTurmaDuplicados(turmas) {
      const contagem = new Map()
      for (const t of turmas) {
        const norm = normalizarTurmaId(t.turmaId)
        if (!norm) continue
        const atual = contagem.get(norm)
        if (atual) {
          contagem.set(norm, { rotulo: t.turmaId.trim(), qtd: atual.qtd + 1 })
        } else {
          contagem.set(norm, { rotulo: t.turmaId.trim(), qtd: 1 })
        }
      }
      return [...contagem.values()].filter((v) => v.qtd > 1).map((v) => v.rotulo)
    }

    function turmaIdDuplicado(turmas, turmaId, excluirId) {
      const norm = normalizarTurmaId(turmaId)
      if (!norm) return false
      return turmas.some((t) => t.id !== excluirId && normalizarTurmaId(t.turmaId) === norm)
    }

    function contagemGlobalIds(rels) {
      const map = new Map()
      for (const r of rels) {
        for (const t of r.turmas) {
          const norm = normalizarTurmaId(t.turmaId)
          if (!norm) continue
          const atual = map.get(norm)
          if (atual) {
            atual.qtd += 1
            atual.relatorioIds.add(r.id)
          } else {
            map.set(norm, { rotulo: t.turmaId.trim(), qtd: 1, relatorioIds: new Set([r.id]) })
          }
        }
      }
      return map
    }

    function idsDuplicadosNoRelatorio(relatorio, rels) {
      const contagem = contagemGlobalIds(rels)
      const ids = new Set()
      for (const t of relatorio.turmas) {
        const norm = normalizarTurmaId(t.turmaId)
        if (!norm) continue
        const c = contagem.get(norm)
        if (c && c.qtd > 1) ids.add(c.rotulo)
      }
      return [...ids]
    }

    function turmaTemIdDuplicadoGlobal(turma, rels) {
      const norm = normalizarTurmaId(turma.turmaId)
      if (!norm) return false
      return (contagemGlobalIds(rels).get(norm)?.qtd ?? 0) > 1
    }

    function outrosRelatoriosComTurmaId(relatorioId, turmaId, rels) {
      const norm = normalizarTurmaId(turmaId)
      if (!norm) return []
      return rels
        .filter((r) => r.id !== relatorioId && r.turmas.some((t) => normalizarTurmaId(t.turmaId) === norm))
        .map((r) => r.nome)
    }

    function listarDuplicatasGlobal(rels) {
      return [...contagemGlobalIds(rels).values()]
        .filter((v) => v.qtd > 1)
        .map((v) => ({
          id: v.rotulo,
          relatorios: rels.filter((r) => v.relatorioIds.has(r.id)).map((r) => r.nome),
        }))
    }

    function turmaTemIdDuplicado(turma, turmas) {
      const norm = normalizarTurmaId(turma.turmaId)
      if (!norm) return false
      return turmas.filter((t) => normalizarTurmaId(t.turmaId) === norm).length > 1
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
    }

    const ICONS = {
      home: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
      folder: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>',
      school: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.1 2.7 2 6 2s6-.9 6-2v-5"/></svg>',
      chevron: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>',
      edit: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>',
      trash: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>',
      users: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      map: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
      grad: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.1 2.7 2 6 2s6-.9 6-2v-5"/></svg>',
      calendar: '<svg class="icon icon-sm" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
      warn: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
      upload: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>',
      plus: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg>',
      check: '<svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>',
    }

    function icon(name) { return ICONS[name] || "" }

    // --- Store ---
    let relatorios = []
    let selectedId = null
    let focusedTurmaId = null
    const expandedTurmas = new Set()
    let authReady = false
    let syncingFromRemote = false
    let saveTimer = null
    let unsubscribeDb = null
    let currentUser = null

    function setSyncStatus(state) {
      const el = document.getElementById("sync-status")
      const label = document.getElementById("sync-label")
      if (!el || !authReady) return
      el.classList.remove("hidden", "pending", "error")
      if (state === "pending") {
        el.classList.add("pending")
        label.textContent = "Salvando..."
      } else if (state === "error") {
        el.classList.add("error")
        label.textContent = "Erro de sync"
      } else {
        label.textContent = "Ao vivo"
      }
    }

    function applyRemoteRelatorios(payload) {
      syncingFromRemote = true
      if (payload && payload.relatorios) {
        relatorios = payload.relatorios
        if (Number(payload.metaAtendimento) > 0) metaAtendimento = Number(payload.metaAtendimento)
      } else {
        relatorios = normalizeRelatorios(payload)
      }
      if (selectedId && !relatorios.some((r) => r.id === selectedId)) {
        selectedId = null
        focusedTurmaId = null
      }
      render()
      syncingFromRemote = false
      setSyncStatus("live")
    }

    async function migrateLocalToCloud() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY)
        if (!raw) return false
        const local = JSON.parse(raw)
        if (!Array.isArray(local) || local.length === 0) return false
        const remote = await fbFetchRelatoriosOnce()
        if (remote.relatorios.length > 0) return false
        await fbSaveRelatorios(local, metaAtendimento)
        localStorage.removeItem(STORAGE_KEY)
        return true
      } catch {
        return false
      }
    }

    function loadStore() {
      /* dados vêm do Firebase em tempo real */
    }

    function saveStore() {
      if (!authReady || syncingFromRemote) return
      setSyncStatus("pending")
      clearTimeout(saveTimer)
      saveTimer = setTimeout(async () => {
        try {
          await fbSaveRelatorios(relatorios, metaAtendimento)
          setSyncStatus("live")
        } catch {
          setSyncStatus("error")
        }
      }, 350)
    }

    function showLogin() {
      document.getElementById("login-screen")?.classList.remove("hidden")
      document.getElementById("app-shell")?.classList.add("hidden")
      authReady = false
      currentUser = null
    }

    function showApp(user) {
      currentUser = user
      authReady = true
      document.getElementById("login-screen")?.classList.add("hidden")
      document.getElementById("app-shell")?.classList.remove("hidden")
      document.getElementById("profile-email").textContent = user.email || ""
      document.getElementById("sync-status")?.classList.remove("hidden")
      setSyncStatus("live")
    }

    function startRealtimeSync() {
      if (unsubscribeDb) unsubscribeDb()
      unsubscribeDb = fbSubscribeRelatorios((data) => {
        applyRemoteRelatorios(data)
      })
    }

    async function handleLoginSubmit(e) {
      e.preventDefault()
      const erro = document.getElementById("login-erro")
      const btn = document.getElementById("btn-login")
      const email = document.getElementById("login-email").value.trim()
      const senha = document.getElementById("login-senha").value
      const lembrar = document.getElementById("login-remember").checked
      erro.classList.add("hidden")
      btn.disabled = true
      btn.textContent = "Entrando..."
      try {
        const persistence = lembrar
          ? firebase.auth.Auth.Persistence.LOCAL
          : firebase.auth.Auth.Persistence.SESSION
        await fbAuth.setPersistence(persistence)
        await fbLogin(email, senha)
        if (lembrar) {
          localStorage.setItem(REMEMBER_CHECK_KEY, "1")
          localStorage.setItem(REMEMBER_EMAIL_KEY, email)
        } else {
          localStorage.removeItem(REMEMBER_CHECK_KEY)
          localStorage.removeItem(REMEMBER_EMAIL_KEY)
        }
      } catch (err) {
        const msg = err?.code === "auth/invalid-credential" || err?.code === "auth/wrong-password"
          ? "E-mail ou senha incorretos."
          : err?.code === "auth/user-not-found"
            ? "Usuário não encontrado. Crie o usuário no Firebase Authentication."
            : "Não foi possível entrar. Verifique e-mail, senha e se o Auth está ativo."
        erro.textContent = msg
        erro.classList.remove("hidden")
      } finally {
        btn.disabled = false
        btn.textContent = "Entrar"
      }
    }

    async function handleLogout() {
      closeDropdowns()
      if (unsubscribeDb) {
        unsubscribeDb()
        unsubscribeDb = null
      }
      relatorios = []
      selectedId = null
      focusedTurmaId = null
      expandedTurmas.clear()
      await fbLogout()
    }

    function getSelected() {
      return relatorios.find((r) => r.id === selectedId) ?? null
    }

    function addRelatorio(nome) {
      const id = uid()
      relatorios.push({ id, nome, turmas: [], criadoEm: hojeIso() })
      saveStore()
      return id
    }

    function importRelatorio(nome, turmas) {
      const id = uid()
      const hoje = hojeIso()
      relatorios.push({ id, nome, turmas, criadoEm: hoje, importadoEm: hoje })
      saveStore()
      return id
    }

    function removeRelatorio(id) {
      relatorios = relatorios.filter((r) => r.id !== id)
      saveStore()
    }

    function addTurma(relatorioId, turma) {
      const r = relatorios.find((x) => x.id === relatorioId)
      if (!r) return
      r.turmas.push({ ...turma, id: uid(), alunos: [] })
      saveStore()
    }

    function updateTurma(relatorioId, turmaId, turma) {
      const r = relatorios.find((x) => x.id === relatorioId)
      if (!r) return
      const t = r.turmas.find((x) => x.id === turmaId)
      if (!t) return
      Object.assign(t, turma)
      saveStore()
    }

    function removeTurma(relatorioId, turmaId) {
      const r = relatorios.find((x) => x.id === relatorioId)
      if (!r) return
      r.turmas = r.turmas.filter((t) => t.id !== turmaId)
      expandedTurmas.delete(turmaId)
      if (focusedTurmaId === turmaId) focusedTurmaId = null
      saveStore()
    }

    function addAluno(relatorioId, turmaId, aluno) {
      const r = relatorios.find((x) => x.id === relatorioId)
      if (!r) return
      const t = r.turmas.find((x) => x.id === turmaId)
      if (!t) return
      t.alunos.push({ ...aluno, id: uid() })
      saveStore()
    }

    function updateAluno(relatorioId, turmaId, alunoId, aluno) {
      const r = relatorios.find((x) => x.id === relatorioId)
      if (!r) return
      const t = r.turmas.find((x) => x.id === turmaId)
      if (!t) return
      const a = t.alunos.find((x) => x.id === alunoId)
      if (!a) return
      Object.assign(a, aluno)
      saveStore()
    }

    function removeAluno(relatorioId, turmaId, alunoId) {
      const r = relatorios.find((x) => x.id === relatorioId)
      if (!r) return
      const t = r.turmas.find((x) => x.id === turmaId)
      if (!t) return
      t.alunos = t.alunos.filter((a) => a.id !== alunoId)
      saveStore()
    }

    // --- Import XLSX ---
    function normalizarSexo(valor) {
      const v = String(valor ?? "").trim().toLowerCase()
      if (v.startsWith("fem")) return "feminino"
      if (v.startsWith("masc")) return "masculino"
      return "outros"
    }

    function normalizarData(valor) {
      if (!valor) return ""
      if (valor instanceof Date && !Number.isNaN(valor.getTime())) {
        return valor.toISOString().slice(0, 10)
      }
      const d = new Date(String(valor))
      if (!Number.isNaN(d.getTime())) return d.toISOString().slice(0, 10)
      return ""
    }

    function parseNomeAba(nome) {
      const m = nome.match(/^(.*?)\s*ID\s*(\S+)\s*$/i)
      if (m) return { municipio: m[1].trim(), turmaId: m[2].trim() }
      return { municipio: nome.trim(), turmaId: "" }
    }

    function brParaIso(dataBr) {
      const [dd, mm, aaaa] = dataBr.split("/")
      if (dd && mm && aaaa) return `${aaaa}-${mm}-${dd}`
      return ""
    }

    function parseCabecalhoCurso(texto) {
      const raw = String(texto ?? "").trim()
      const datas = raw.match(/(\d{2}\/\d{2}\/\d{4})\s*A\s*(\d{2}\/\d{2}\/\d{4})/i)
      let curso = raw, dataInicio = "", dataFim = ""
      if (datas) {
        dataInicio = brParaIso(datas[1])
        dataFim = brParaIso(datas[2])
        curso = raw.slice(0, datas.index).replace(/[-–]\s*$/, "").trim()
      }
      return { curso, dataInicio, dataFim }
    }

    function parseRelatorioXlsx(buffer, nomeArquivo) {
      const wb = XLSX.read(buffer, { cellDates: true })
      const turmas = []

      for (const sheetName of wb.SheetNames) {
        if (sheetName.trim().toUpperCase() === "GERAL") continue
        const ws = wb.Sheets[sheetName]
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: "" })
        if (rows.length === 0) continue

        const { municipio, turmaId } = parseNomeAba(sheetName)
        const { curso, dataInicio, dataFim } = parseCabecalhoCurso(String(rows[0]?.[0] ?? ""))
        const alunos = []

        for (let i = 2; i < rows.length; i++) {
          const row = rows[i]
          const primeiraCel = String(row?.[0] ?? "").trim()
          if (!primeiraCel) continue
          const upper = primeiraCel.toUpperCase()
          if (
            upper.startsWith("CADASTRO RESERVA") ||
            upper.startsWith("FAIXA ETÁRIA") ||
            upper.startsWith("FAIXA ETARIA") ||
            upper.startsWith("TOTAL")
          ) break

          const dataNascimento = normalizarData(row?.[1])
          const idadePlanilha = Number(row?.[2])
          const idade = Number.isFinite(idadePlanilha) && idadePlanilha > 0
            ? idadePlanilha
            : calcularIdade(dataNascimento)

          alunos.push({
            id: uid(),
            nome: primeiraCel,
            sexo: normalizarSexo(row?.[3]),
            dataNascimento,
            idade,
            municipio: String(row?.[4] ?? "").trim() || municipio,
          })
        }

        turmas.push({
          id: uid(), turmaId, municipio, tipologia: "", curso, dataInicio, dataFim, concludentes: 0, alunos,
        })
      }

      const nome = nomeArquivo
        .replace(/\.xlsx$/i, "")
        .replace(/-[0-9a-f]{6}$/i, "")
        .trim()

      const totalAlunos = turmas.reduce((s, t) => s + t.alunos.length, 0)
      return { nome: nome || "Relatório importado", turmas, totalAlunos }
    }

    function buscarRelatorios(query) {
      const q = query.trim().toLowerCase()
      if (!q) return []
      const results = []
      for (const r of relatorios) {
        if (r.nome.toLowerCase().includes(q)) {
          results.push({ type: "relatorio", relatorioId: r.id, label: r.nome, sub: `${r.turmas.length} turma(s)` })
        }
        for (const t of r.turmas) {
          const matchId = t.turmaId.toLowerCase().includes(q)
          const matchCurso = (t.curso || "").toLowerCase().includes(q)
          const matchMun = (t.municipio || "").toLowerCase().includes(q)
          if (matchId || matchCurso || matchMun) {
            results.push({
              type: "turma",
              relatorioId: r.id,
              turmaId: t.id,
              label: `Turma ${t.turmaId}`,
              sub: `${r.nome} · ${t.curso || t.municipio || "—"}`,
            })
          }
        }
      }
      return results.slice(0, 12)
    }

    function applyTheme(theme) {
      const root = document.documentElement
      if (theme === "dark") root.setAttribute("data-theme", "dark")
      else if (theme === "light") root.setAttribute("data-theme", "light")
      else root.removeAttribute("data-theme")
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
      const isDark = theme === "dark" || (!theme && prefersDark) || (theme !== "light" && root.getAttribute("data-theme") === "dark")
      document.querySelector(".theme-icon-dark")?.classList.toggle("hidden", isDark)
      document.querySelector(".theme-icon-light")?.classList.toggle("hidden", !isDark)
      localStorage.setItem(THEME_KEY, theme || "auto")
    }

    function loadTheme() {
      const saved = localStorage.getItem(THEME_KEY)
      if (saved === "dark" || saved === "light") applyTheme(saved)
      else applyTheme(null)
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme")
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
      const isDark = current === "dark" || (!current && prefersDark)
      applyTheme(isDark ? "light" : "dark")
    }

    function exportBackup() {
      const lista = normalizeRelatorios(relatorios)
      const payload = {
        version: 1,
        exportadoEm: new Date().toISOString(),
        metaAtendimento,
        relatorios: lista,
      }
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" })
      const url = URL.createObjectURL(blob)
      const a = document.createElement("a")
      const data = new Date().toISOString().slice(0, 10)
      a.href = url
      a.download = `perfil-lote-backup-${data}.json`
      a.click()
      URL.revokeObjectURL(url)
    }

    function importBackup(file) {
      const reader = new FileReader()
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result)
          const lista = Array.isArray(data) ? data : data.relatorios
          if (!Array.isArray(lista)) throw new Error("formato inválido")
          if (!confirm(`Restaurar backup com ${lista.length} relatório(s)? Isso substituirá todos os dados atuais.`)) return
          relatorios = normalizeRelatorios(lista)
          if (Number(data.metaAtendimento) > 0) metaAtendimento = Number(data.metaAtendimento)
          selectedId = null
          focusedTurmaId = null
          expandedTurmas.clear()
          saveStore()
          render()
          const msg = document.getElementById("import-msg")
          msg.textContent = `Backup restaurado: ${lista.length} relatório(s).`
          msg.classList.remove("hidden")
        } catch {
          alert("Não foi possível restaurar o backup. Verifique se o arquivo é um JSON válido exportado pelo sistema.")
        }
      }
      reader.readAsText(file)
    }

      const turmasHtml = selected.turmas.length === 0
        ? `<p class="dashed-empty">Nenhuma turma cadastrada. Clique em "Nova Turma" para começar.</p>`
        : selected.turmas.map((t) => renderTurmaCard(selected.id, t)).join("")

      main.innerHTML = `
        <div class="content">
          <header class="page-header">
            <div>
              <h2>${escapeHtml(selected.nome)}</h2>
              <p class="subtitle">Relatório de turmas e perfil de lote</p>
              <div class="meta">
                <span class="meta-pill">${icon("school")} ${selected.turmas.length} turma(s)</span>
                <span class="meta-pill">${icon("users")} ${todosAlunos.length} inscrito(s)</span>
                <span class="meta-pill">${icon("check")} ${totalConcludentes} concludente(s)</span>
              </div>
            </div>
            <button class="btn btn-sm" id="btn-nova-turma">${icon("plus")} Nova Turma</button>
          </header>
          ${alertaDup}
          <section class="section">
            <h3 class="section-title">Perfil de Lote — Faixa Etária e Gênero</h3>
            <div class="panel">${renderFaixaTable(todosAlunos)}</div>
          </section>
          <section>
            <h3 class="section-title">Turmas</h3>
            ${turmasHtml}
          </section>
        </div>`

      document.getElementById("btn-nova-turma")?.addEventListener("click", () => openModalTurma())
    }

    function render() {
      if (!authReady) return
      if (!Array.isArray(relatorios)) relatorios = normalizeRelatorios(relatorios)
      try {
        renderNav()
        renderBreadcrumb()
        renderNotificacoes()
        renderMain()
      } catch (err) {
        console.error("Erro ao renderizar:", err)
        const main = document.getElementById("main")
        if (main) {
          main.innerHTML = `<div class="content"><div class="login-erro">Erro ao carregar a página. Recarregue ou restaure um backup.<br><small>${escapeHtml(err.message)}</small></div></div>`
        }
      }
    }

    // --- Modals ---
    function closeModal() {
      document.getElementById("modal-root").innerHTML = ""
      document.body.style.overflow = ""
    }

    function openModal(html) {
      const root = document.getElementById("modal-root")
      root.innerHTML = `<div class="modal-overlay" id="modal-overlay">${html}</div>`
      document.body.style.overflow = "hidden"
      root.querySelector("#modal-overlay")?.addEventListener("click", (e) => {
        if (e.target.id === "modal-overlay") closeModal()
      })
      root.querySelector("[data-close]")?.addEventListener("click", closeModal)
    }

    function openModalMeta() {
      openModal(`
        <div class="modal" role="dialog">
          <div class="modal-header">
            <div>
              <h2>Meta de atendimento</h2>
              <p>Defina o número total de educandos previstos para a meta.</p>
            </div>
            <button class="btn-ghost" data-close aria-label="Fechar">
              <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <form id="form-meta" class="form-grid">
            <div class="field">
              <label for="metaValor">Meta (nº de educandos)</label>
              <input id="metaValor" type="number" min="1" step="1" value="${metaAtendimento}" required autofocus />
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-outline btn-sm" data-close>Cancelar</button>
              <button type="submit" class="btn btn-sm">Salvar</button>
            </div>
          </form>
        </div>`)

      document.getElementById("form-meta")?.addEventListener("submit", (e) => {
        e.preventDefault()
        const valor = parseInt(document.getElementById("metaValor").value, 10)
        if (!Number.isFinite(valor) || valor < 1) return
        metaAtendimento = valor
        saveStore()
        closeModal()
        renderMain()
      })
    }

    function openModalRelatorio() {
      openModal(`
        <div class="modal" role="dialog">
          <div class="modal-header">
            <div>
              <h2>Novo Relatório</h2>
              <p>Dê um nome para identificar o relatório.</p>
            </div>
            <button class="btn-ghost" data-close aria-label="Fechar">
              <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <form id="form-relatorio" class="form-grid">
            <div class="field">
              <label for="relNome">Nome do Relatório</label>
              <input id="relNome" placeholder="Ex: RELATÓRIO 09" required autofocus />
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-outline btn-sm" data-close>Cancelar</button>
              <button type="submit" class="btn btn-sm">Criar</button>
            </div>
          </form>
        </div>`)

      document.getElementById("form-relatorio")?.addEventListener("submit", (e) => {
        e.preventDefault()
        const nome = document.getElementById("relNome").value.trim()
        if (!nome) return
        selectedId = addRelatorio(nome)
        closeModal()
        render()
      })
    }

    function openModalTurma(turmaId) {
      const selected = getSelected()
      if (!selected) return
      const turma = turmaId ? selected.turmas.find((t) => t.id === turmaId) : null
      const isEdit = !!turma
      const d = turma ?? { turmaId: "", municipio: "", curso: "", dataInicio: "", dataFim: "", concludentes: 0 }

      openModal(`
        <div class="modal" role="dialog">
          <div class="modal-header">
            <div><h2>${isEdit ? "Editar Turma" : "Nova Turma"}</h2></div>
            <button class="btn-ghost" data-close aria-label="Fechar">
              <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <form id="form-turma" class="form-grid" data-edit-id="${isEdit ? turmaId : ""}">
            <p id="turma-erro" class="form-erro hidden"></p>
            <div class="form-row two">
              <div class="field">
                <label for="turmaId">ID da Turma</label>
                <input id="turmaId" value="${escapeHtml(d.turmaId)}" placeholder="Ex: T-001" required />
              </div>
              <div class="field">
                <label for="municipio">Município</label>
                <input id="municipio" value="${escapeHtml(d.municipio)}" placeholder="Ex: Fortaleza" />
              </div>
            </div>
            <div class="field">
              <label for="curso">Nome do Curso</label>
              <input id="curso" value="${escapeHtml(d.curso)}" placeholder="Ex: Informática Básica" />
            </div>
            <div class="form-row two">
              <div class="field">
                <label for="dataInicio">Data de Início</label>
                <input id="dataInicio" type="date" value="${escapeHtml(d.dataInicio)}" />
              </div>
              <div class="field">
                <label for="dataFim">Data de Término</label>
                <input id="dataFim" type="date" value="${escapeHtml(d.dataFim)}" />
              </div>
            </div>
            <div class="field">
              <label for="concludentes">Quantidade de concludentes</label>
              <input id="concludentes" type="number" min="0" value="${d.concludentes ?? 0}" placeholder="Ex: 25" />
              <p class="field-hint">Educandos qualificados/concludentes. A lista de alunos representa os inscritos.</p>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-outline btn-sm" data-close>Cancelar</button>
              <button type="submit" class="btn btn-sm">Salvar Turma</button>
            </div>
          </form>
        </div>`)

      document.getElementById("form-turma")?.addEventListener("submit", (e) => {
        e.preventDefault()
        const data = {
          turmaId: document.getElementById("turmaId").value.trim(),
          municipio: document.getElementById("municipio").value.trim(),
          tipologia: "",
          curso: document.getElementById("curso").value.trim(),
          dataInicio: document.getElementById("dataInicio").value,
          dataFim: document.getElementById("dataFim").value,
          concludentes: parseInt(document.getElementById("concludentes").value, 10) || 0,
        }
        if (!data.turmaId) return
        const excluirId = isEdit ? turmaId : undefined
        if (turmaIdDuplicado(selected.turmas, data.turmaId, excluirId)) {
          const erro = document.getElementById("turma-erro")
          erro.textContent = `Já existe uma turma com o ID "${data.turmaId}" neste relatório.`
          erro.classList.remove("hidden")
          return
        }
        if (isEdit) updateTurma(selected.id, turmaId, data)
        else addTurma(selected.id, data)
        closeModal()
        render()
      })
    }

    function openModalAlunoEdit(turmaId, alunoId) {
      const selected = getSelected()
      if (!selected) return
      const turma = selected.turmas.find((t) => t.id === turmaId)
      const aluno = turma?.alunos.find((a) => a.id === alunoId)
      if (!aluno) return

      openModal(`
        <div class="modal" role="dialog">
          <div class="modal-header">
            <div><h2>Editar Aluno</h2></div>
            <button class="btn-ghost" data-close aria-label="Fechar">
              <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <form id="form-edit-aluno" class="form-grid" data-turma="${turmaId}" data-aluno="${alunoId}">
            <div class="field">
              <label for="edit-nome">Nome</label>
              <input id="edit-nome" value="${escapeHtml(aluno.nome)}" required />
            </div>
            <div class="form-row two">
              <div class="field">
                <label for="edit-nascimento">Nascimento</label>
                <input id="edit-nascimento" type="date" value="${escapeHtml(aluno.dataNascimento)}" required />
              </div>
              <div class="field">
                <label for="edit-idade">Idade</label>
                <input id="edit-idade" type="number" value="${aluno.idade}" readonly tabindex="-1" />
              </div>
            </div>
            <div>
              <label>Gênero</label>
              <input type="hidden" id="edit-sexo" name="sexo" value="${aluno.sexo}" />
              <div class="sexo-btns" id="edit-sexo-btns">
                ${["feminino", "masculino", "outros"].map((s) => `
                  <button type="button" class="sexo-btn ${aluno.sexo === s ? "active" : ""}" data-edit-sexo="${s}">
                    ${s === "feminino" ? "Fem." : s === "masculino" ? "Masc." : "Outros"}
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-outline btn-sm" data-close>Cancelar</button>
              <button type="submit" class="btn btn-sm">Salvar</button>
            </div>
          </form>
        </div>`)

      document.getElementById("edit-nascimento")?.addEventListener("change", (e) => {
        const v = e.target.value
        document.getElementById("edit-idade").value = v ? String(calcularIdade(v)) : ""
      })

      document.querySelectorAll("[data-edit-sexo]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.getElementById("edit-sexo").value = btn.dataset.editSexo
          document.querySelectorAll("[data-edit-sexo]").forEach((b) => b.classList.remove("active"))
          btn.classList.add("active")
        })
      })

      document.getElementById("form-edit-aluno")?.addEventListener("submit", (e) => {
        e.preventDefault()
        const form = e.target
        const nome = document.getElementById("edit-nome").value.trim()
        const dataNascimento = document.getElementById("edit-nascimento").value
        const idade = parseInt(document.getElementById("edit-idade").value, 10)
        const sexo = document.getElementById("edit-sexo").value
        if (!nome || !dataNascimento || Number.isNaN(idade)) return
        updateAluno(selected.id, form.dataset.turma, form.dataset.aluno, { nome, sexo, idade, dataNascimento })
        closeModal()
        renderMain()
      })
    }

    // --- Events ---
    function toggleMobileSidebar(open) {
      const sidebar = document.querySelector(".sidebar")
      const overlay = document.getElementById("sidebar-overlay")
      const isOpen = open ?? !sidebar.classList.contains("open")
      sidebar.classList.toggle("open", isOpen)
      overlay.classList.toggle("open", isOpen)
    }

    document.getElementById("btn-menu").addEventListener("click", () => toggleMobileSidebar())

    document.getElementById("sidebar-overlay").addEventListener("click", () => toggleMobileSidebar(false))

    document.getElementById("btn-home").addEventListener("click", () => {
      toggleMobileSidebar(false)
      selectedId = null
      focusedTurmaId = null
      render()
    })

    document.getElementById("btn-theme").addEventListener("click", toggleTheme)

    document.getElementById("btn-notificacoes").addEventListener("click", (e) => {
      e.stopPropagation()
      toggleDropdown("notif-menu")
    })

    document.getElementById("btn-perfil").addEventListener("click", (e) => {
      e.stopPropagation()
      toggleDropdown("profile-menu")
    })

    document.getElementById("btn-backup").addEventListener("click", () => {
      closeDropdowns()
      exportBackup()
    })

    document.getElementById("btn-restaurar").addEventListener("click", () => {
      closeDropdowns()
      document.getElementById("backup-input").click()
    })

    document.getElementById("backup-input").addEventListener("change", (e) => {
      const file = e.target.files?.[0]
      e.target.value = ""
      if (file) importBackup(file)
    })

    document.getElementById("btn-novo-relatorio-menu").addEventListener("click", () => {
      closeDropdowns()
      openModalRelatorio()
    })

    document.getElementById("btn-importar-menu").addEventListener("click", () => {
      closeDropdowns()
      document.getElementById("file-input").click()
    })

    document.getElementById("btn-logout").addEventListener("click", handleLogout)

    document.getElementById("form-login").addEventListener("submit", handleLoginSubmit)

    document.getElementById("search-input").addEventListener("input", (e) => {
      renderSearchResults(e.target.value)
    })

    document.getElementById("search-input").addEventListener("focus", (e) => {
      if (e.target.value.trim()) renderSearchResults(e.target.value)
    })

    document.getElementById("search-results").addEventListener("click", (e) => {
      const item = e.target.closest(".search-result-item")
      if (!item) return
      document.getElementById("search-input").value = ""
      document.getElementById("search-results").classList.add("hidden")
      navegarPara(item.dataset.searchRel, item.dataset.searchTurma || null)
    })

    document.getElementById("breadcrumb").addEventListener("click", (e) => {
      if (e.target.closest("[data-bc-home]")) {
        selectedId = null
        focusedTurmaId = null
        render()
        return
      }
      if (e.target.closest("[data-bc-relatorio]")) {
        focusedTurmaId = null
        render()
      }
    })

    document.addEventListener("click", (e) => {
      if (!e.target.closest("#notif-dropdown") && !e.target.closest("#profile-dropdown")) {
        closeDropdowns()
      }
      if (!e.target.closest(".topbar-search")) {
        document.getElementById("search-results").classList.add("hidden")
      }
    })

    document.getElementById("btn-novo-relatorio").addEventListener("click", openModalRelatorio)

    document.getElementById("btn-importar").addEventListener("click", () => {
      document.getElementById("file-input").click()
    })

    document.getElementById("file-input").addEventListener("change", async (e) => {
      const file = e.target.files?.[0]
      e.target.value = ""
      if (!file) return

      const btn = document.getElementById("btn-importar")
      const iconEl = document.getElementById("import-icon")
      const label = document.getElementById("import-label")
      const msg = document.getElementById("import-msg")

      btn.disabled = true
      iconEl.innerHTML = '<span class="spin">' + icon("upload") + '</span>'
      label.textContent = "Importando..."
      msg.classList.add("hidden")

      try {
        const buffer = await file.arrayBuffer()
        const { nome, turmas, totalAlunos } = parseRelatorioXlsx(buffer, file.name)
        if (turmas.length === 0) {
          msg.textContent = "Nenhuma turma encontrada na planilha. Verifique se cada aba representa uma turma."
          msg.classList.remove("hidden")
          return
        }
        selectedId = importRelatorio(nome, turmas)
        const novoRel = relatorios.find((r) => r.id === selectedId)
        const idsDupGlobal = novoRel ? idsDuplicadosNoRelatorio(novoRel, relatorios) : []
        msg.textContent = `Importado: ${turmas.length} turma(s) e ${totalAlunos} inscrito(s).${idsDupGlobal.length ? ` Atenção: IDs duplicados — ${idsDupGlobal.join(", ")}.` : ""}`
        msg.classList.remove("hidden")
        render()
      } catch {
        msg.textContent = "Não foi possível ler o arquivo. Use um .xlsx no formato do relatório."
        msg.classList.remove("hidden")
      } finally {
        btn.disabled = false
        iconEl.innerHTML = icon("upload")
        label.textContent = "Importar Excel"
      }
    })

    document.getElementById("nav-list").addEventListener("click", (e) => {
      if (e.target.closest("[data-home]")) {
        selectedId = null
        focusedTurmaId = null
        render()
        return
      }
      const sel = e.target.closest("[data-select]")
      if (sel) {
        selectedId = sel.dataset.select
        focusedTurmaId = null
        toggleMobileSidebar(false)
        render()
        return
      }
      const del = e.target.closest("[data-delete]")
      if (del) {
        const r = relatorios.find((x) => x.id === del.dataset.delete)
        if (r && confirm(`Excluir o relatório "${r.nome}" e todas as suas turmas?`)) {
          removeRelatorio(del.dataset.delete)
          if (selectedId === del.dataset.delete) selectedId = null
          render()
        }
      }
    })

    document.getElementById("main").addEventListener("input", (e) => {
      if (e.target.name !== "nascimento") return
      const form = e.target.closest("[data-quick-add]")
      if (!form) return
      const v = e.target.value
      form.idade.value = v ? String(calcularIdade(v)) : ""
    })

    document.getElementById("main").addEventListener("submit", (e) => {
      const form = e.target.closest("[data-quick-add]")
      if (!form) return
      e.preventDefault()
      const selected = getSelected()
      if (!selected) return
      const turmaId = form.dataset.quickAdd
      const nome = form.nome.value.trim()
      const dataNascimento = form.nascimento.value
      const idade = parseInt(form.idade.value, 10)
      const sexo = form.sexo.value
      if (!nome || !dataNascimento || Number.isNaN(idade)) return
      addAluno(selected.id, turmaId, { nome, sexo, idade, dataNascimento })
      form.nome.value = ""
      form.nascimento.value = ""
      form.idade.value = ""
      renderMain()
    })

    document.getElementById("main").addEventListener("click", (e) => {
      if (e.target.closest("[data-edit-meta]")) {
        openModalMeta()
        return
      }
      const sexoBtn = e.target.closest("[data-sexo]")
      if (sexoBtn) {
        const form = sexoBtn.closest("[data-quick-add]")
        if (!form) return
        form.sexo.value = sexoBtn.dataset.sexo
        form.querySelectorAll(".sexo-btn").forEach((b) => b.classList.remove("active"))
        sexoBtn.classList.add("active")
        return
      }
      const toggle = e.target.closest("[data-toggle-turma]")
      if (toggle) {
        const id = toggle.dataset.toggleTurma
        setTurmaExpanded(id, !expandedTurmas.has(id))
        return
      }
      const collapseTurmaBtn = e.target.closest("[data-collapse-turma]")
      if (collapseTurmaBtn) {
        setTurmaExpanded(collapseTurmaBtn.dataset.collapseTurma, false)
        return
      }
      const editTurma = e.target.closest("[data-edit-turma]")
      if (editTurma) { openModalTurma(editTurma.dataset.editTurma); return }
      const deleteTurma = e.target.closest("[data-delete-turma]")
      if (deleteTurma) {
        const selected = getSelected()
        const t = selected?.turmas.find((x) => x.id === deleteTurma.dataset.deleteTurma)
        if (t && confirm(`Excluir a turma "${t.turmaId}"?`)) {
          removeTurma(selected.id, t.id)
          render()
        }
        return
      }
      const editAlunoBtn = e.target.closest("[data-edit-aluno]")
      if (editAlunoBtn) {
        const [turmaId, alunoId] = editAlunoBtn.dataset.editAluno.split(":")
        openModalAlunoEdit(turmaId, alunoId)
        return
      }
      const removeAlunoBtn = e.target.closest("[data-remove-aluno]")
      if (removeAlunoBtn) {
        const selected = getSelected()
        const [turmaId, alunoId] = removeAlunoBtn.dataset.removeAluno.split(":")
        removeAluno(selected.id, turmaId, alunoId)
        renderMain()
      }
    })

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeModal()
        closeDropdowns()
        document.getElementById("search-results").classList.add("hidden")
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "k") {
        e.preventDefault()
        document.getElementById("search-input").focus()
      }
    })

    function loadRememberedLogin() {
      const lembrar = localStorage.getItem(REMEMBER_CHECK_KEY) === "1"
      const email = localStorage.getItem(REMEMBER_EMAIL_KEY) || ""
      document.getElementById("login-remember").checked = lembrar
      if (lembrar && email) {
        document.getElementById("login-email").value = email
      }
    }

    // Init
    loadTheme()
    loadRememberedLogin()
    showLogin()

    if (location.protocol === "file:") {
      const aviso = document.getElementById("login-erro")
      aviso.innerHTML = "Não abra o arquivo direto. Execute <strong>iniciar.bat</strong> na pasta do projeto e acesse <strong>http://localhost:8080</strong>."
      aviso.classList.remove("hidden")
    }

    fbOnAuthChange(async (user) => {
      if (user) {
        showApp(user)
        await migrateLocalToCloud()
        startRealtimeSync()
      } else {
        showLogin()
      }
    })
  </script>
</body>
</html>
